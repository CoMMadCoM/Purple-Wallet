<div class="form__control">
  <div class="form__icon">
    <img [src]="iconURL" width="30" height="30" [alt]="type" />
  </div>

  <input
    class="form__input"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [(ngModel)]="value"
  />
  <div class="from__button--container">
    <button
      style="cursor: pointer; background: transparent; border: none"
      class="form__button"
      type="button"
      (click)="onButtonToggleClick()"
    >
      <img [src]="buttonIcon" width="30" height="30" [alt]="type" />
    </button>
  </div>
</div>
